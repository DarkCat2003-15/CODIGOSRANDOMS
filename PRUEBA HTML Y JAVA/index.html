<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PRUEBA</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="card"  id="login">
        <h2>LOGIN</h2>

        <input id="usuario" placeholder="Usuario"><br>
        <input id="clave" type="password" placeholder="Clave"><br>

        <button onclick="IniciarSesion()">INICIAR SESION</button>

        <p id="mensaje"></p>
    </div>
    
    <div class="card" id="datos" style="display: none;">
        <h2>DATOS DEL USUARIO</h2>
        <p><b>ID></b><span id="id"></span></p>
        <p><b>Nombre></b><span id="nombre"></span></p>
        <p><b>Apellido></b><span id="apellido"></span></p>
        <p><b>Usuario></b><span id="usuario"></span></p>
        <p><b>Correo></b><span id="correo"></span></p>

        <button onclick="CerrarSesion()">CERRAR SESION</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
